# TrafficGuard - Fail2Ban Filter: nginx-limit-conn
# 检测 Nginx 连接限制日志

[Definition]

# 匹配 Nginx 连接限制日志
# 示例日志：
# 2026/07/01 15:30:00 [error] 12345#0: *67890 limiting connections by zone "perip", client: 1.2.3.4, server: example.com, request: "GET / HTTP/1.1", host: "example.com"
failregex = ^%(__prefix_line)slimiting connections by zone .*, client: <HOST>
ignoreregex =

# 定义日志前缀格式
__prefix_line = %d/%d/%d %H:%M:%S \[%level\] %pid#\d+: \*\d+ 

[Init]
# 初始化部分（可选）
