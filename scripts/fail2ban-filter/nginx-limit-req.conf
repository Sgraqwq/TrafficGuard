# TrafficGuard - Fail2Ban Filter: nginx-limit-req
# 检测 Nginx 速率限制日志 (limit_req)
# 匹配 Nginx 错误日志中的速率限制消息
# 参考官方 fail2ban filter: nginx-limit-req.conf
#
# 示例日志:
# 2026/07/01 15:30:00 [error] 12345#0: *67890 limiting requests, excess: 20.500 by zone "req_limit", client: 1.2.3.4, server: example.com, request: "GET / HTTP/1.1", host: "example.com"

[Definition]

# 匹配速率限制消息
# datepattern 使用自动行首日期检测 ({^LN-BEG})
# __prefix_line 匹配 Nginx error 日志的标准前缀格式
__prefix_line = \s*\[error\] \d+#\d+: \*\d+\s+

failregex = ^%(__prefix_line)s(?:limiting|delaying) requests(?:, excess: [\d\.]+)? by zone "[^"]*", client: <HOST>

ignoreregex =

datepattern = {^LN-BEG}
