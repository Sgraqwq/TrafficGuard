# TrafficGuard - Fail2Ban Jail 配置
# 将此文件放到 /etc/fail2ban/jail.local

[DEFAULT]
# 默认封禁时间：1 小时
bantime = 3600

# 默认检测时间窗口：10 分钟
findtime = 600

# 默认最大重试次数：10 次
maxretry = 10

# 默认封禁动作：使用 iptables
banaction = iptables-multiport

# 忽略本地 IP
ignoreip = 127.0.0.1/8 ::1

# 日志目标
logtarget = /var/log/fail2ban.log

# 启用数据库（持久化封禁记录）
dbbackend = sqlite
dbfilename = /var/lib/fail2ban/fail2ban.sqlite3

[nginx-limit-req]
# Nginx 速率限制 jail
enabled = true
port = http,https
filter = nginx-limit-req
logpath = /var/log/nginx/error.log
maxretry = 10
findtime = 60
bantime = 600
action = iptables-multiport[name=nginx-limit-req, port="http,https", protocol=tcp]

[nginx-limit-conn]
# Nginx 连接限制 jail
enabled = true
port = http,https
filter = nginx-limit-conn
logpath = /var/log/nginx/error.log
maxretry = 5
findtime = 60
bantime = 1800
action = iptables-multiport[name=nginx-limit-conn, port="http,https", protocol=tcp]

[sshd]
# SSH 防护 jail
enabled = true
port = ssh
filter = sshd
logpath = /var/log/auth.log
maxretry = 3
findtime = 600
bantime = 3600
